name: Basic Check

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  basic-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: |
          python -m py_compile scripts/prompt_builder.py
          python -m py_compile scripts/run_task.py
          python -m py_compile scripts/validate_epics.py
          python -m py_compile scripts/watch_tasks.py

      - name: Check required directories
          run: |
            pwd
            ls -la
            echo "Checking TASKS"
            test -d TASKS
            echo "Checking CONTEXT"
            test -d CONTEXT
            echo "Checking OUTPUTS"
            test -d OUTPUTS
            echo "Checking scripts"
            test -d scripts
            echo "Checking epics"
            test -d epics
            echo "Checking gui"
            test -d gui